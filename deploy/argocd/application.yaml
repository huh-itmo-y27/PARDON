apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pardon
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/huh-itmo-y27/PARDON
    targetRevision: main
    path: deploy/k8s/overlays/argocd
  destination:
    server: https://kubernetes.default.svc
    namespace: pardon
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

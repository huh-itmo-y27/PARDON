apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pardon-ingress
  namespace: pardon
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: 10m
spec:
  ingressClassName: nginx
  rules:
    - host: pardon.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: pardon-api
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pardon-ui
                port:
                  number: 3001

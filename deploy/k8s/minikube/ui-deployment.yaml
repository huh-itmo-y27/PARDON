apiVersion: apps/v1
kind: Deployment
metadata:
  name: pardon-ui
  namespace: pardon
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pardon-ui
  template:
    metadata:
      labels:
        app: pardon-ui
    spec:
      containers:
        - name: ui
          image: pardon-ui:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: pardon-config
          ports:
            - containerPort: 3001
          readinessProbe:
            httpGet:
              path: /
              port: 3001
            initialDelaySeconds: 8
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: pardon-ui
  namespace: pardon
spec:
  selector:
    app: pardon-ui
  ports:
    - port: 3001
      targetPort: 3001
      protocol: TCP


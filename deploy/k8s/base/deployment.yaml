apiVersion: apps/v1
kind: Deployment
metadata:
  name: pardon-postgres
  namespace: pardon
  labels:
    app.kubernetes.io/name: pardon
    app.kubernetes.io/component: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pardon
      app.kubernetes.io/component: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pardon
        app.kubernetes.io/component: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          env:
            - name: POSTGRES_DB
              value: pardon
            - name: POSTGRES_USER
              value: pardon
            - name: POSTGRES_PASSWORD
              value: pardon
          ports:
            - name: postgres
              containerPort: 5432
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U pardon -d pardon
            initialDelaySeconds: 8
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U pardon -d pardon
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pardon-api
  namespace: pardon
  labels:
    app.kubernetes.io/name: pardon
    app.kubernetes.io/component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pardon
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pardon
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: api
          image: pardon-api
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - uv run alembic upgrade head && uv run uvicorn services.api.app.main:app --host 0.0.0.0 --port 8000
          envFrom:
            - configMapRef:
                name: pardon-config
          ports:
            - name: http
              containerPort: 8000
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 8
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pardon-ui
  namespace: pardon
  labels:
    app.kubernetes.io/name: pardon
    app.kubernetes.io/component: ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pardon
      app.kubernetes.io/component: ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pardon
        app.kubernetes.io/component: ui
    spec:
      containers:
        - name: ui
          image: pardon-ui
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: pardon-config
          ports:
            - name: http
              containerPort: 3001
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 8
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

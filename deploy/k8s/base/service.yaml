apiVersion: v1
kind: Service
metadata:
  name: pardon-postgres
  namespace: pardon
  labels:
    app.kubernetes.io/name: pardon
    app.kubernetes.io/component: postgres
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: pardon
    app.kubernetes.io/component: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
---
apiVersion: v1
kind: Service
metadata:
  name: pardon-api
  namespace: pardon
  labels:
    app.kubernetes.io/name: pardon
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: pardon
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: 8000
      targetPort: http
---
apiVersion: v1
kind: Service
metadata:
  name: pardon-ui
  namespace: pardon
  labels:
    app.kubernetes.io/name: pardon
    app.kubernetes.io/component: ui
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: pardon
    app.kubernetes.io/component: ui
  ports:
    - name: http
      port: 3001
      targetPort: http

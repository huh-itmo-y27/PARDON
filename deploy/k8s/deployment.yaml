apiVersion: apps/v1
kind: Deployment
metadata:
  name: pardon-mlflow-exporter
  namespace: pardon
  labels:
    app.kubernetes.io/name: pardon
    app.kubernetes.io/component: mlflow-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pardon
      app.kubernetes.io/component: mlflow-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pardon
        app.kubernetes.io/component: mlflow-exporter
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: mlflow-exporter
          image: pardon-app
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: pardon-config
          ports:
            - name: metrics
              containerPort: 8010
          readinessProbe:
            httpGet:
              path: /
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /
              port: metrics
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi

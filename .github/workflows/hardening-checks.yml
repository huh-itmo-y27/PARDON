name: Hardening Checks

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  api-integration-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --dev

      - name: Run API integration tests
        run: uv run pytest tests/test_api_integration.py

  migration-and-contract-checks:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: pardon
          POSTGRES_USER: pardon
          POSTGRES_PASSWORD: pardon
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pardon -d pardon"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 8

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --dev

      - name: Alembic migration check
        env:
          PARDON_DATABASE_URL: postgresql+psycopg://pardon:pardon@localhost:5432/pardon
        run: make ci_db_migrate_check

      - name: OpenAPI and UI codegen drift check
        run: make ci_openapi_codegen_check

name: Build and Publish App Images

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - "deploy/k8s/kustomization.yaml"
      - "docs/**"
      - "README.md"

permissions:
  contents: write
  packages: write

jobs:
  build-and-publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image metadata
        id: image
        run: |
          image_base="ghcr.io/${GITHUB_REPOSITORY,,}"
          image_tag="${GITHUB_SHA::12}"
          echo "api_name=${image_base}/api" >> "$GITHUB_OUTPUT"
          echo "ui_name=${image_base}/ui" >> "$GITHUB_OUTPUT"
          echo "tag=${image_tag}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/api/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.image.outputs.api_name }}:${{ steps.image.outputs.tag }}
            ${{ steps.image.outputs.api_name }}:latest

      - name: Build and push UI image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/ui/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=http://pardon.local
          tags: |
            ${{ steps.image.outputs.ui_name }}:${{ steps.image.outputs.tag }}
            ${{ steps.image.outputs.ui_name }}:latest

      - name: Update Kubernetes image tag
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          path = Path("deploy/k8s/kustomization.yaml")
          lines = path.read_text(encoding="utf-8").splitlines()
          images = {
              "pardon-api": os.environ["API_IMAGE"],
              "pardon-ui": os.environ["UI_IMAGE"],
          }
          tag = os.environ["IMAGE_TAG"]

          current_image = None
          for index, line in enumerate(lines):
              stripped = line.strip()
              if stripped.startswith("- name: "):
                  current_image = stripped.removeprefix("- name: ")
              elif current_image in images and stripped.startswith("newName: "):
                  indent = line[: len(line) - len(line.lstrip())]
                  lines[index] = f"{indent}newName: {images[current_image]}"
              elif current_image in images and stripped.startswith("newTag: "):
                  indent = line[: len(line) - len(line.lstrip())]
                  lines[index] = f"{indent}newTag: {tag}"

          path.write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY
        env:
          API_IMAGE: ${{ steps.image.outputs.api_name }}
          UI_IMAGE: ${{ steps.image.outputs.ui_name }}
          IMAGE_TAG: ${{ steps.image.outputs.tag }}

      - name: Commit updated deployment tag
        run: |
          if git diff --quiet deploy/k8s/kustomization.yaml; then
            echo "Deployment tag is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deploy/k8s/kustomization.yaml
          git commit -m "Update deployment image tag"
          git push

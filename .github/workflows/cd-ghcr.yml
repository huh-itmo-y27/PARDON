name: Build and Publish Image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - "deploy/k8s/kustomization.yaml"
      - "docs/**"
      - "README.md"

permissions:
  contents: write
  packages: write

jobs:
  build-and-publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image metadata
        id: image
        run: |
          image_name="ghcr.io/${GITHUB_REPOSITORY,,}"
          image_tag="${GITHUB_SHA::12}"
          echo "name=${image_name}" >> "$GITHUB_OUTPUT"
          echo "tag=${image_tag}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:${{ steps.image.outputs.tag }}
            ${{ steps.image.outputs.name }}:latest

      - name: Update Kubernetes image tag
        run: |
          sed -i "s|newName: .*|newName: ${{ steps.image.outputs.name }}|" deploy/k8s/kustomization.yaml
          sed -i "s|newTag: .*|newTag: ${{ steps.image.outputs.tag }}|" deploy/k8s/kustomization.yaml

      - name: Commit updated deployment tag
        run: |
          if git diff --quiet deploy/k8s/kustomization.yaml; then
            echo "Deployment tag is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deploy/k8s/kustomization.yaml
          git commit -m "Update deployment image tag"
          git push

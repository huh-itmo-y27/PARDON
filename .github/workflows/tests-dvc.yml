name: Tests With DVC

on:
  workflow_dispatch:

jobs:
  tests-with-dvc:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --dev

      - name: Configure DVC remote credentials
        env:
          MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
        run: |
          uv run dvc remote modify --local minio_storage access_key_id "$MINIO_ACCESS_KEY"
          uv run dvc remote modify --local minio_storage secret_access_key "$MINIO_SECRET_KEY"

      - name: Show DVC config
        run: uv run dvc config --list

      - name: Pull data and models from DVC
        run: make data_pull

      - name: Run tests
        run: make test
